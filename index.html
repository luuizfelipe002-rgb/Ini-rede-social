<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mini Rede Social</title>
  <style>
    body {
      font-family: Arial;
      background-color: #f2f2f2;
      text-align: center;
    }
    h1 {
      color: #333;
    }
    #postagem {
      width: 80%;
      padding: 10px;
      margin: 10px;
    }
    button {
      padding: 10px;
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }
    .post {
      background: white;
      padding: 10px;
      margin: 10px auto;
      width: 80%;
      border-radius: 5px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

  <h1>Minha Mini Rede Social 🚀</h1>

  <input type="text" id="postagem" placeholder="O que você está pensando?">
  <br>
  <button onclick="publicar()">Publicar</button>

  <div id="feed"></div>

  <script>
    function publicar() {
      var texto = document.getElementById("postagem").value;
      if (texto === "") return;

      var novaPostagem = document.createElement("div");
      novaPostagem.className = "post";
      novaPostagem.innerText = texto;

      document.getElementById("feed").prepend(novaPostagem);
      document.getElementById("postagem").value = "";
    }
  </script>

</body>
</html>
