<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Minha Rede</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">

<meta name="theme-color" content="#000000">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f2f2f2;
}

header{
  background:black;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

.container{
  padding:15px;
}

textarea{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
  resize:none;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:black;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.post{
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<header>🔥 Minha Rede</header>

<div class="container">
  <textarea id="postText" placeholder="O que você está pensando?"></textarea>
  <button onclick="publicar()">Publicar</button>

  <div id="feed"></div>
</div>

<script>
function publicar(){
  const texto = document.getElementById("postText").value;
  if(texto.trim() === "") return;

  const feed = document.getElementById("feed");
  const div = document.createElement("div");
  div.className = "post";
  div.innerText = texto;

  feed.prepend(div);
  document.getElementById("postText").value="";
}

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
